name: Generar guias EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: epg-master
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Actualizar canales tvpassport.com
        run: |
          mkdir -p sites/tvpassport.com
          echo "Actualizando canales tvpassport.com..."
          npm run channels:parse --- --config=./sites/tvpassport.com/tvpassport.com.config.js --output=./sites/tvpassport.com/tvpassport.com.channels.xml

      - name: Extraer identificadores de canales
        run: |
          mkdir -p reports

          echo "Extrayendo IDs unicos desde todas las listas .channels.xml..."

          find sites -type f -name "*.channels.xml" -print0 \
            | xargs -0 grep -hoE '<channel id="[^"]+"' \
            | sed -E 's/<channel id="([^"]+)"/\1/' \
            | sort -u > reports/channel_ids.txt

          echo "Extrayendo IDs con archivo de origen..."

          find sites -type f -name "*.channels.xml" | while read -r file; do
            grep -oE '<channel id="[^"]+"' "$file" \
              | sed -E 's/<channel id="([^"]+)"/\1/' \
              | awk -v f="$file" '{ print $0 " | " f }'
          done | sort -u > reports/channel_ids_with_source.txt

          echo "Total IDs únicos:"
          wc -l reports/channel_ids.txt

          echo "Primeros 20 IDs:"
          head -20 reports/channel_ids.txt

      - name: Generar guias mi.tv
        run: |
          mkdir -p guides/mi.tv

          for code in ar br cl co sv gt hn mx py pe
          do
            echo "Generando mi.tv $code..."
            npm run grab --- --channels=sites/mi.tv/mi.tv_${code}.channels.xml --output=guides/mi.tv/${code}.xml
          done

      - name: Generar guia tvinsider.com
        run: |
          mkdir -p guides/tvinsider.com
          echo "Generando tvinsider.com..."
          npm run grab --- --site=tvinsider.com --output=guides/tvinsider.com/guide.xml

      - name: Generar guia movistarplus.es
        run: |
          mkdir -p guides/movistarplus.es
          echo "Generando movistarplus.es..."
          npm run grab --- --site=movistarplus.es --output=guides/movistarplus.es/guide.xml

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f guides/mi.tv/*.xml
          git add -f guides/tvinsider.com/*.xml
          git add -f guides/movistarplus.es/*.xml
          git add -f sites/tvpassport.com/*.xml
          git add -f reports/*.txt

          git diff --cached --quiet && exit 0

          git commit -m "Actualizar guias EPG"

      - name: Rebase y push
        run: |
          for i in 1 2 3; do
            git fetch origin master
            git pull --rebase origin master && git push origin master && exit 0
            echo "Reintentando push ($i)..."
            sleep 5
          done
          exit 1
