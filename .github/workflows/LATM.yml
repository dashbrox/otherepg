name: Generar guias mi.tv y gatotv

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: epg-mi-tv-gatotv
  cancel-in-progress: false

env:
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Actualizar canales gatotv.com
        run: |
          mkdir -p sites/gatotv.com
          echo "Actualizando canales gatotv.com..."
          npm run channels:parse -- --config=./sites/gatotv.com/gatotv.com.config.js --output=./sites/gatotv.com/gatotv.com.channels.xml

      - name: Extraer identificadores de canales
        run: |
          mkdir -p reports

          echo "Extrayendo IDs unicos desde todas las listas .channels.xml..."

          find sites -type f -name "*.channels.xml" -print0 \
            | xargs -0 grep -hoE '<channel id="[^"]+"' \
            | sed -E 's/<channel id="([^"]+)"/\1/' \
            | sort -u > reports/channel_ids.txt

          echo "Extrayendo IDs con archivo de origen..."

          find sites -type f -name "*.channels.xml" | while read -r file; do
            grep -oE '<channel id="[^"]+"' "$file" \
              | sed -E 's/<channel id="([^"]+)"/\1/' \
              | awk -v f="$file" '{ print $0 " | " f }'
          done | sort -u > reports/channel_ids_with_source.txt

          echo "Total IDs únicos:"
          wc -l reports/channel_ids.txt

          echo "Primeros 20 IDs:"
          head -20 reports/channel_ids.txt

      - name: Generar guias mi.tv
        run: |
          mkdir -p guides/mi.tv

          for code in ar br cl co sv gt hn mx py pe
          do
            echo "Generando mi.tv $code..."
            npm run grab -- --channels=sites/mi.tv/mi.tv_${code}.channels.xml --output=guides/mi.tv/${code}.xml
          done

      - name: Generar guia gatotv.com
        run: |
          mkdir -p guides/gatotv.com
          echo "Generando gatotv.com..."
          npm run grab -- --site=gatotv.com --output=guides/gatotv.com/guide.xml

      - name: Commit si hubo cambios
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f guides/mi.tv/*.xml
          git add -f guides/gatotv.com/*.xml
          git add -f sites/gatotv.com/*.xml
          git add -f reports/*.txt

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Actualizar guias EPG"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Rebase y push
        if: steps.commit_changes.outputs.has_changes == 'true'
        run: |
          for i in 1 2 3; do
            git fetch origin "$BRANCH_NAME"
            git pull --rebase origin "$BRANCH_NAME" && git push origin HEAD:"$BRANCH_NAME" && exit 0
            echo "Reintentando push ($i)..."
            sleep 5
          done
          exit 1
