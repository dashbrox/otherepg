name: Generar guias mi.tv

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Generar guias mi.tv
        run: |
          mkdir -p guides/mi.tv

          for code in ar br cl co sv gt hn mx py pe
          do
            echo "Generando $code..."
            npm run grab --- --channels=sites/mi.tv/mi.tv_${code}.channels.xml --output=guides/mi.tv/${code}.xml
          done

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f guides/mi.tv/*.xml
          git diff --cached --quiet || git commit -m "Actualizar guias mi.tv"
          git push
